<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Profilim — CLICKRUSHER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Saira+Condensed:wght@600;800&family=Chivo+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#08111e;--bg2:#060d18;
  --panel:rgba(8,18,38,.88);--panel-2:rgba(5,12,26,.96);
  --bord:rgba(0,200,255,.14);--bord2:rgba(0,200,255,.28);
  --chalk:#deeeff;--chalk-dim:#4e7090;
  --amber:#FFD700;--amber2:#B8860B;
  --signal:#FF3A4A;--cyan:#00C8FF;
  --display:'Saira Condensed',system-ui,sans-serif;
  --mono:'Chivo Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  background:radial-gradient(ellipse 140% 80% at 50% -10%,#0e1f3a 0%,#07101e 45%,var(--bg2) 100%);
  color:var(--chalk);font-family:var(--display);overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 35% at 50% 0%,rgba(0,80,180,.18) 0%,transparent 70%),
    radial-gradient(ellipse 40% 20% at 20% 100%,rgba(0,160,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 20% at 80% 100%,rgba(0,160,255,.06) 0%,transparent 60%);
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{user-select:none}
.fc{border-radius:50%;object-fit:cover;background:#0d1e35;border:3px solid var(--amber2);
  box-shadow:0 0 0 1px rgba(255,215,0,.3),0 3px 12px rgba(0,0,0,.6);display:block;flex-shrink:0}

header{
  position:sticky;top:0;z-index:50;
  background:var(--panel-2);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bord2);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:0 4px 30px rgba(0,0,0,.5),0 1px 0 rgba(0,200,255,.08);
  position:relative;z-index:50;
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--chalk-dim);background:rgba(0,200,255,.07);
  border:1px solid var(--bord2);border-radius:999px;padding:7px 14px;
  text-decoration:none;transition:color .14s,background .14s;
}
.back-btn:hover{color:var(--cyan);background:rgba(0,200,255,.12)}
.hdr-title{
  font-family:'Lilita One',cursive;font-size:20px;
  background:linear-gradient(180deg,#ffffff 0%,#7aafd4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

main{max-width:720px;margin:0 auto;padding:20px 14px 80px;position:relative;z-index:1}

/* --- Profil kartı --- */
.pcard{
  background:var(--panel);border:1px solid var(--bord2);border-radius:20px;
  padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;
  margin-bottom:20px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(0,200,255,.08);
  position:relative;overflow:hidden;
}
.pcard::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,100,200,.15) 0%,transparent 70%);
}
.pcard .avatar{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,#004d80,#006699);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lilita One',cursive;font-size:38px;color:#fff;
  border:3px solid var(--amber2);
  box-shadow:0 0 0 2px var(--amber),0 0 0 4px rgba(90,60,0,.4),0 0 24px rgba(255,215,0,.2),0 0 20px rgba(0,150,255,.2);
}
.pcard .pname{
  font-family:'Lilita One',cursive;font-size:28px;
  color:var(--amber);text-shadow:0 0 12px rgba(255,215,0,.3);
}
.pcard .pmeta{font-family:var(--mono);font-size:12px;color:var(--chalk-dim)}
.pstats{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.pstats .stat{text-align:center;min-width:60px}
.pstats .stat .val{
  font-family:var(--mono);font-size:24px;font-weight:700;color:var(--chalk);display:block;
  text-shadow:0 0 10px rgba(0,200,255,.2);
}
.pstats .stat .lbl{font-family:var(--mono);font-size:10px;color:var(--chalk-dim);letter-spacing:.1em;text-transform:uppercase}

/* --- Bölüm başlığı --- */
.section{margin-bottom:20px}
.sec-head{
  font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--cyan);margin-bottom:10px;
  text-shadow:0 0 8px rgba(0,200,255,.3);
}

/* --- Ülke istatistikleri --- */
.country-grid{display:flex;flex-wrap:wrap;gap:8px}
.ctry-item{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--bord);border-radius:10px;
  padding:7px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,.35),inset 0 1px 0 rgba(0,200,255,.04);
  transition:border-color .14s,box-shadow .14s;
}
.ctry-item:hover{border-color:var(--bord2);box-shadow:0 4px 16px rgba(0,0,0,.4),0 0 8px rgba(0,200,255,.1)}
.ctry-item img{width:28px;height:28px}
.ctry-item .ctry-name{font-size:12px;font-weight:700;letter-spacing:.04em}
.ctry-item .ctry-n{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--amber)}

/* --- Yarış geçmişi --- */
.race-list{display:flex;flex-direction:column;gap:8px}
.race-item{
  background:var(--panel);border:1px solid var(--bord);border-radius:12px;
  padding:11px 14px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 14px rgba(0,0,0,.35),inset 0 1px 0 rgba(0,200,255,.04);
  transition:border-color .14s;
}
.race-item:hover{border-color:var(--bord2)}
.race-badge{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.race-badge.win{background:rgba(255,215,0,.14);border:1px solid rgba(255,215,0,.35)}
.race-badge.lose{background:rgba(0,200,255,.06);border:1px solid var(--bord)}
.race-info{flex:1;min-width:0}
.race-info .ri-top{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.race-info .ri-top .result-tag{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;
  padding:2px 8px;border-radius:999px;
}
.result-tag.win{background:rgba(255,215,0,.18);color:var(--amber);border:1px solid rgba(255,215,0,.4)}
.result-tag.lose{background:rgba(0,200,255,.07);color:var(--chalk-dim);border:1px solid var(--bord)}
.race-info .ri-bot{font-family:var(--mono);font-size:11px;color:var(--chalk-dim);margin-top:3px}
.race-score{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--amber);flex-shrink:0;text-shadow:0 0 8px rgba(255,215,0,.25)}

.empty{
  background:var(--panel);border:1px solid var(--bord);border-radius:12px;
  padding:24px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--chalk-dim);
}

footer{
  position:fixed;bottom:0;left:0;right:0;text-align:center;z-index:50;
  font-family:var(--mono);font-size:10px;color:var(--chalk-dim);
  background:var(--panel-2);padding:5px;border-top:1px solid var(--bord2);letter-spacing:.04em;
  box-shadow:0 -4px 20px rgba(0,0,0,.4);
}
</style>
</head>
<body>

<header>
  <a href="/" class="back-btn">← Anasayfa</a>
  <span class="hdr-title">Profilim</span>
</header>

<main>
  <div class="pcard" id="pcard">
    <div style="font-family:var(--mono);font-size:13px;color:var(--chalk-dim)">Yükleniyor...</div>
  </div>

  <div class="section" id="countriesSection" style="display:none">
    <div class="sec-head">Tıkladığım Ülkeler</div>
    <div class="country-grid" id="countriesGrid"></div>
  </div>

  <div class="section">
    <div class="sec-head">Yarış Geçmişi</div>
    <div class="race-list" id="raceList">
      <div class="empty">Henüz yarış geçmişi yok</div>
    </div>
  </div>
</main>

<footer>CLICKRUSHER · bayraklar stilize çizimdir · resmi turnuva markalarıyla bağı yoktur</footer>

<script src="/flags.js"></script>
<script>
const TEAMS_MAP = {
  MEX:'Meksika',RSA:'Güney Afrika',KOR:'Güney Kore',CZE:'Çekya',
  CAN:'Kanada',BIH:'Bosna Hersek',QAT:'Katar',SUI:'İsviçre',
  SCO:'İskoçya',MAR:'Fas',BRA:'Brezilya',HAI:'Haiti',
  USA:'ABD',PAR:'Paraguay',AUS:'Avustralya',TUR:'Türkiye',
  GER:'Almanya',CIV:'Fildişi Sahili',CUW:'Curaçao',ECU:'Ekvador',
  NED:'Hollanda',JPN:'Japonya',SWE:'İsveç',TUN:'Tunus',
  ESP:'İspanya',CPV:'Yeşil Burun',KSA:'Suudi Arabistan',URU:'Uruguay',
  BEL:'Belçika',EGY:'Mısır',IRN:'İran',NZL:'Yeni Zelanda',
  FRA:'Fransa',NOR:'Norveç',SEN:'Senegal',IRQ:'Irak',
  ARG:'Arjantin',AUT:'Avusturya',JOR:'Ürdün',ALG:'Cezayir',
  POR:'Portekiz',UZB:'Özbekistan',COL:'Kolombiya',COD:'DR Kongo',
  ENG:'İngiltere',GHA:'Gana',PAN:'Panama',CRO:'Hırvatistan',
};

const deviceId   = localStorage.getItem('ta26_device');
const storedName = localStorage.getItem('ta26_name');

function fmt(n){return Number(n).toLocaleString('tr-TR')}
function fmtDate(ts){
  if(!ts) return '–';
  return new Date(ts).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
}
function fmtDateShort(ts){
  if(!ts) return '';
  return new Date(ts).toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
}

async function load(){
  if(!deviceId || !storedName){
    document.getElementById('pcard').innerHTML='<div style="font-family:var(--mono);font-size:13px;color:var(--signal)">Giriş yapmadan profil görüntülenemez.</div>';
    return;
  }
  try {
    const res  = await fetch(`/api/profile?device=${encodeURIComponent(deviceId)}`);
    const data = await res.json();
    if(!data.ok){ throw new Error('api error'); }
    renderProfile(data);
  } catch(e) {
    document.getElementById('pcard').innerHTML='<div style="font-family:var(--mono);font-size:13px;color:var(--signal)">Yüklenemedi, tekrar dene.</div>';
  }
}

function renderProfile(data){
  const name     = data.name || storedName || 'Kullanıcı';
  const initial  = name.charAt(0).toUpperCase();
  const totalClicks = data.total;
  const joinDate = fmtDate(data.createdAt);

  // Profil kartı
  const wins  = (data.raceHistory||[]).filter(r=>r.result==='win').length;
  const races = (data.raceHistory||[]).length;
  document.getElementById('pcard').innerHTML = `
    <div class="avatar">${initial}</div>
    <div class="pname">${name}</div>
    <div class="pmeta">Katılım: ${joinDate}</div>
    <div class="pstats">
      <div class="stat"><span class="val">${fmt(totalClicks)}</span><span class="lbl">Toplam Tık</span></div>
      <div class="stat"><span class="val">${races}</span><span class="lbl">Yarış</span></div>
      <div class="stat"><span class="val">${wins}</span><span class="lbl">Galibiyet</span></div>
    </div>`;

  // Ülke istatistikleri
  const countries = Object.entries(data.countries || {})
    .filter(([,n]) => n > 0)
    .sort((a,b) => b[1]-a[1]);

  if(countries.length > 0){
    const secEl = document.getElementById('countriesSection');
    const gridEl = document.getElementById('countriesGrid');
    secEl.style.display = '';
    gridEl.innerHTML = countries.map(([code, n]) => {
      const imgSrc = window.drawCountryFlag(code, code);
      const cName  = TEAMS_MAP[code] || code;
      return `<div class="ctry-item">
        <img class="fc" src="${imgSrc}" width="28" height="28" alt="${cName}">
        <div>
          <div class="ctry-name">${cName}</div>
          <div class="ctry-n">${fmt(n)}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Yarış geçmişi
  const raceList = document.getElementById('raceList');
  if(!data.raceHistory || !data.raceHistory.length){
    raceList.innerHTML = '<div class="empty">Henüz yarış geçmişi yok</div>';
    return;
  }
  raceList.innerHTML = data.raceHistory.map(r => {
    const isWin   = r.result === 'win';
    const modeLabel = r.mode === 'team' ? '🤝 Takımlı' : '🏃 Bireysel';
    const dateStr   = fmtDateShort(r.finishedAt);
    const winnerStr = isWin ? 'Kazandın!' : `Kazanan: ${r.winnerName || '–'}`;
    return `<div class="race-item">
      <div class="race-badge ${isWin?'win':'lose'}">${isWin?'🏆':'🎯'}</div>
      <div class="race-info">
        <div class="ri-top">
          <span class="result-tag ${isWin?'win':'lose'}">${isWin?'GALİP':'KATILIM'}</span>
          ${modeLabel} · ${winnerStr}
        </div>
        <div class="ri-bot">Yarış #${r.raceId} · ${dateStr}</div>
      </div>
      <div class="race-score">${fmt(r.score)}<br><span style="font-size:9px;color:var(--chalk-dim)">TIK</span></div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
