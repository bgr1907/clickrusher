<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CHAMELEON RUN — CLICKRUSHER</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Saira+Condensed:wght@600;800&family=Chivo+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="/flags.js"></script>
<style>
:root{
  --bg:#0a1f0e;--panel:rgba(6,24,12,.92);--bord:rgba(255,255,255,.18);
  --amber:#FFC83D;--signal:#FF4D42;--chalk:#F2F7F0;--chalk-dim:#BFD6C4;
  --grass1:#2E7D33;--grass2:#27702C;--green:#4DFF88;
  --display:'Saira Condensed',system-ui,sans-serif;
  --mono:'Chivo Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--display);color:var(--chalk)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(4,14,7,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--bord);
}
.back-btn{
  display:inline-flex;align-items:center;gap:5px;flex-shrink:0;
  font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:var(--chalk-dim);background:rgba(255,255,255,.07);
  border:1px solid var(--bord);border-radius:999px;padding:6px 12px;text-decoration:none;
}
.hdr-title{
  flex:1;text-align:center;
  font-family:'Lilita One',cursive;font-size:18px;letter-spacing:.04em;
  background:linear-gradient(180deg,#fff 0%,#a8e6b4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-meta{font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:.06em}

/* CANVAS */
#gameCanvas{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  width:100%;height:calc(100% - 52px);
  display:block;touch-action:none;
}

/* OVERLAY base */
.overlay{
  position:fixed;inset:0;top:52px;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  padding:16px;
}
.overlay.hidden{display:none!important}

/* LOBBY */
#lobbyOverlay{gap:14px}
.lobby-box{
  width:100%;max-width:480px;
  background:var(--panel);border:1px solid var(--bord);border-radius:16px;padding:16px;
}
.lobby-box h3{
  font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--chalk-dim);margin-bottom:12px;
}
.lobby-room-id{
  font-family:var(--mono);font-size:10px;color:var(--chalk-dim);
  text-align:center;margin-bottom:8px;letter-spacing:.08em;
}
.player-slots{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.player-slot{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;
}
.player-slot.me{background:rgba(255,200,61,.07);border-color:rgba(255,200,61,.3)}
.player-slot.empty{opacity:.4;border-style:dashed}
.slot-lane{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:700;
}
.slot-flag{width:32px;height:32px;flex-shrink:0;border-radius:6px;overflow:hidden;background:#1a2e1f}
.slot-flag img,.slot-flag canvas{width:100%;height:100%;object-fit:cover;display:block}
.slot-name{flex:1;font-size:13px;font-weight:700}
.slot-you{font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:.06em}
.slot-ready{font-size:16px;flex-shrink:0;margin-left:auto}

/* Flag picker */
.flag-picker-wrap{
  border-top:1px solid var(--bord);padding-top:12px;margin-top:2px;
}
.flag-picker-wrap label{
  display:block;font-family:var(--mono);font-size:10px;color:var(--chalk-dim);
  letter-spacing:.08em;margin-bottom:8px;
}
.flag-search{
  width:100%;background:rgba(255,255,255,.06);border:1px solid var(--bord);
  border-radius:8px;padding:8px 10px;color:var(--chalk);font-family:var(--mono);font-size:12px;
  margin-bottom:8px;outline:none;
}
.flag-search::placeholder{color:var(--chalk-dim)}
.flag-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:6px;
  max-height:140px;overflow-y:auto;
}
.flag-opt{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(255,255,255,.04);border:2px solid transparent;
  border-radius:8px;padding:5px 3px;cursor:pointer;transition:border-color .12s;
}
.flag-opt:hover{border-color:rgba(255,255,255,.25)}
.flag-opt.selected{border-color:var(--amber)}
.flag-opt canvas,.flag-opt img{width:36px;height:36px;border-radius:4px;display:block}
.flag-opt span{font-family:var(--mono);font-size:8px;color:var(--chalk-dim);text-align:center;line-height:1.2}

/* Lobby buttons */
.lobby-btn{
  width:100%;padding:13px;border-radius:12px;background:var(--amber);color:#152b10;
  font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  transition:opacity .15s;
}
.lobby-btn:disabled{opacity:.35;cursor:not-allowed}
.lobby-btn-sec{
  width:100%;padding:10px;border-radius:10px;margin-top:8px;
  background:rgba(255,255,255,.06);border:1px solid var(--bord);
  font-size:13px;font-weight:700;color:var(--chalk-dim);
}
.lobby-note{font-family:var(--mono);font-size:10px;color:var(--chalk-dim);text-align:center;margin-top:6px;opacity:.7}
.waiting-dots::after{content:'...';animation:dots 1.2s infinite steps(4,end)}
@keyframes dots{0%{content:'.'}33%{content:'..'}67%{content:'...'}100%{content:'..'}}

/* COUNTDOWN */
#countdownOverlay{
  gap:8px;
  background:rgba(0,0,0,.55);
}
.countdown-num{
  font-family:'Lilita One',cursive;font-size:clamp(96px,28vw,160px);
  background:linear-gradient(180deg,#fff 0%,#FFD700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,200,0,.4));
  animation:cdpop .25s ease-out;
}
.countdown-go{
  font-family:'Lilita One',cursive;font-size:clamp(60px,18vw,100px);
  color:var(--green);filter:drop-shadow(0 0 20px rgba(77,255,136,.5));
  animation:cdpop .2s ease-out;
}
@keyframes cdpop{from{transform:scale(1.3);opacity:.6}to{transform:scale(1);opacity:1}}
.countdown-sub{font-family:var(--mono);font-size:13px;color:var(--chalk-dim);letter-spacing:.08em}

/* TIMER BAR (during active game) */
#timerBar{
  position:fixed;top:52px;left:0;right:0;z-index:60;
  height:4px;background:rgba(255,255,255,.08);
}
#timerFill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));transition:width .5s linear}
#timerBar.hidden{display:none}

/* POWER-UP UI */
#powerupBar{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  padding:10px 16px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,transparent 100%);
  display:flex;align-items:center;gap:12px;
}
#powerupBar.hidden{display:none}
.pu-box{
  flex:1;display:flex;align-items:center;gap:10px;
  background:rgba(6,24,12,.85);border:1px solid var(--bord);border-radius:12px;padding:10px 14px;
}
.pu-icon{font-size:28px;flex-shrink:0}
.pu-info{flex:1}
.pu-name{font-size:14px;font-weight:800;letter-spacing:.04em;color:var(--chalk)}
.pu-hint{font-family:var(--mono);font-size:10px;color:var(--chalk-dim);margin-top:1px}
.pu-cooldown{height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin-top:6px;overflow:hidden}
.pu-cooldown-fill{height:100%;background:var(--amber);width:100%;transition:width .1s linear}
.pu-use-btn{
  flex-shrink:0;padding:12px 20px;border-radius:12px;
  background:var(--amber);color:#152b10;
  font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  transition:opacity .15s,transform .1s;active:scale(.96);
}
.pu-use-btn:disabled{opacity:.3;cursor:not-allowed}
.pu-empty{
  flex:1;font-family:var(--mono);font-size:12px;color:var(--chalk-dim);
  text-align:center;opacity:.6;
}

/* FINISHED OVERLAY */
#finishedOverlay{gap:14px;background:rgba(0,0,0,.85)}
.finish-title{
  font-family:'Lilita One',cursive;font-size:32px;letter-spacing:.04em;
  background:linear-gradient(180deg,#fff 0%,#FFD700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.podium{
  width:100%;max-width:420px;
  background:var(--panel);border:1px solid var(--bord);border-radius:16px;
  overflow:hidden;
}
.podium-row{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.podium-row:last-child{border-bottom:none}
.podium-row.first{background:rgba(255,200,61,.1)}
.podium-rank{
  width:28px;text-align:center;font-family:var(--mono);font-size:16px;font-weight:700;
  flex-shrink:0;
}
.podium-flag{width:36px;height:36px;flex-shrink:0;border-radius:6px;overflow:hidden;background:#1a2e1f}
.podium-flag canvas,.podium-flag img{width:100%;height:100%;object-fit:cover;display:block}
.podium-name{flex:1;font-size:14px;font-weight:800}
.podium-dist{font-family:var(--mono);font-size:14px;color:var(--amber);font-weight:700}

.effect-flash{
  position:fixed;inset:0;top:52px;z-index:70;pointer-events:none;
  opacity:0;transition:opacity .1s;
}
.effect-flash.show{opacity:1}

/* LANE LABELS (during game) */
#laneLabels{
  position:fixed;top:52px;left:0;right:0;z-index:55;
  display:flex;pointer-events:none;
}
#laneLabels.hidden{display:none}
.lane-label{
  flex:1;padding:6px 4px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,transparent 100%);
}
.ll-name{font-size:11px;font-weight:800;letter-spacing:.04em;white-space:nowrap;overflow:hidden;max-width:80px}
.ll-dist{font-family:var(--mono);font-size:10px;color:var(--amber)}
.ll-effect{font-size:14px;height:16px;line-height:16px}
</style>
</head>
<body>

<header>
  <a class="back-btn" href="/">← Geri</a>
  <div class="hdr-title">CHAMELEON RUN</div>
  <div class="hdr-meta" id="hdrMeta">Bekleniyor...</div>
</header>

<!-- Timer bar -->
<div id="timerBar" class="hidden"><div id="timerFill" style="width:100%"></div></div>

<!-- Lane labels (during game) -->
<div id="laneLabels" class="hidden">
  <div class="lane-label" id="ll0"><div class="ll-effect" id="lle0"></div><div class="ll-name" id="lln0">—</div><div class="ll-dist" id="lld0">0m</div></div>
  <div class="lane-label" id="ll1"><div class="ll-effect" id="lle1"></div><div class="ll-name" id="lln1">—</div><div class="ll-dist" id="lld1">0m</div></div>
  <div class="lane-label" id="ll2"><div class="ll-effect" id="lle2"></div><div class="ll-name" id="lln2">—</div><div class="ll-dist" id="lld2">0m</div></div>
  <div class="lane-label" id="ll3"><div class="ll-effect" id="lle3"></div><div class="ll-name" id="lln3">—</div><div class="ll-dist" id="lld3">0m</div></div>
</div>

<!-- Game canvas -->
<canvas id="gameCanvas"></canvas>

<!-- Lobby overlay -->
<div class="overlay" id="lobbyOverlay">
  <div class="lobby-box">
    <h3>Oda</h3>
    <div class="lobby-room-id" id="lobbyRoomId">—</div>
    <div class="player-slots" id="playerSlots"></div>

    <!-- Flag picker (for current player) -->
    <div class="flag-picker-wrap" id="flagPickerWrap">
      <label>T-Shirt Bayrağını Seç</label>
      <input type="text" class="flag-search" id="flagSearch" placeholder="Ülke ara...">
      <div class="flag-grid" id="flagGrid"></div>
    </div>

    <button class="lobby-btn" id="hazirBtn" style="margin-top:12px" disabled>
      ✓ HAZIR
    </button>
    <button class="lobby-btn-sec" id="forceStartBtn" style="display:none">
      Erken Başlat (Kurucu) →
    </button>
    <div class="lobby-note" id="lobbyNote">Bayrak seç ve HAZIR'a bas</div>
  </div>
</div>

<!-- Countdown overlay -->
<div class="overlay hidden" id="countdownOverlay">
  <div class="countdown-sub">HAZIR OL!</div>
  <div class="countdown-num" id="cdNum">5</div>
</div>

<!-- Power-up bar -->
<div id="powerupBar" class="hidden">
  <div class="pu-box" id="puBox">
    <div class="pu-empty" id="puEmpty">Güç-up geliyor<span class="waiting-dots"></span></div>
    <div id="puContent" style="display:none;width:100%;display:none">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="pu-icon" id="puIcon">⚒️</div>
        <div class="pu-info">
          <div class="pu-name" id="puName">ÇEKIÇ</div>
          <div class="pu-hint" id="puHint">En yakın rakibi geri atar</div>
          <div class="pu-cooldown"><div class="pu-cooldown-fill" id="puCoolFill"></div></div>
        </div>
      </div>
    </div>
  </div>
  <button class="pu-use-btn" id="puUseBtn" disabled>SPACE</button>
</div>

<!-- Finished overlay -->
<div class="overlay hidden" id="finishedOverlay">
  <div class="finish-title" id="finishTitle">BİTTİ!</div>
  <div class="podium" id="podium"></div>
  <button class="lobby-btn" style="max-width:340px;margin-top:4px" onclick="window.location.href='/'">Ana Sayfaya Dön</button>
</div>

<!-- Effect flash -->
<div class="effect-flash" id="effectFlash"></div>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const BASE_SPEED    = 180;   // units/sec
const BOOST_AMOUNT  = 0.5;   // +50%
const BOOST_DUR     = 3000;  // ms
const HAMMER_HIT    = 220;   // units
const FREEZE_DUR    = 2500;  // ms
const LIGHTNING_HIT = 160;   // units
const POWERUP_INTERVAL = 8000; // ms between power-up drops
const LANE_COLORS   = ['#E63946','#457B9D','#F4A261','#2A9D8F'];
const COUNTRIES = [
  {c:'TUR',n:'Türkiye'},{c:'GER',n:'Almanya'},{c:'FRA',n:'Fransa'},{c:'ENG',n:'İngiltere'},
  {c:'ESP',n:'İspanya'},{c:'CRO',n:'Hırvatistan'},{c:'BRA',n:'Brezilya'},{c:'ARG',n:'Arjantin'},
  {c:'NED',n:'Hollanda'},{c:'POR',n:'Portekiz'},{c:'BEL',n:'Belçika'},{c:'CRO',n:'Hırvatistan'},
  {c:'USA',n:'ABD'},{c:'MEX',n:'Meksika'},{c:'JPN',n:'Japonya'},{c:'KOR',n:'Güney Kore'},
  {c:'AUS',n:'Avustralya'},{c:'MAR',n:'Fas'},{c:'SEN',n:'Senegal'},{c:'GHA',n:'Gana'},
  {c:'URU',n:'Uruguay'},{c:'COL',n:'Kolombiya'},{c:'SUI',n:'İsviçre'},{c:'SWE',n:'İsveç'},
  {c:'NOR',n:'Norveç'},{c:'CAN',n:'Kanada'},{c:'RSA',n:'Güney Afrika'},{c:'EGY',n:'Mısır'},
  {c:'KSA',n:'Suudi Arabistan'},{c:'QAT',n:'Katar'},{c:'IRN',n:'İran'},{c:'ALG',n:'Cezayir'},
  {c:'TUN',n:'Tunus'},{c:'AUT',n:'Avusturya'},{c:'CZE',n:'Çekya'},{c:'BIH',n:'Bosna Hersek'},
  {c:'ECU',n:'Ekvador'},{c:'PAR',n:'Paraguay'},{c:'UZB',n:'Özbekistan'},{c:'NZL',n:'Yeni Zelanda'},
  {c:'SCO',n:'İskoçya'},{c:'IRQ',n:'Irak'},{c:'JOR',n:'Ürdün'},{c:'CIV',n:'Fildişi Sahili'},
  {c:'PAN',n:'Panama'},{c:'CPV',n:'Yeşil Burun'},
];
const PU_META = {
  hammer:    { icon:'⚒️', name:'ÇEKIÇ',    hint:'En yakın rakibi geri atar',  color:'#FF6B6B' },
  boost:     { icon:'⚡', name:'BOOST',     hint:'+50% hız — 3 saniye',        color:'#FFD700' },
  freeze:    { icon:'❄️', name:'DONDUR',   hint:'En yakın rakibi dondurur',   color:'#74C0FC' },
  lightning: { icon:'🌩️', name:'YILDIRIM', hint:'Herkesi geri atar',          color:'#DA77F2' },
};
const PU_TYPES = Object.keys(PU_META);

// ============================================================
// STATE
// ============================================================
const roomId  = new URLSearchParams(location.search).get('id');
const deviceId = getDevice();
let myFlag    = JSON.parse(localStorage.getItem('crun_flag') || 'null');
let serverState = null;
let sse = null;

// Physics sim state
let gameStartAt = null;
let gameEndAt   = null;
let playerState = {}; // deviceId → {offset, boosts:[], freezes:[], lane}
let processedEvents = new Set();

// My power-up
let myPowerup   = null;  // {type, icon, name, hint}
let puCooldown  = 0;     // timestamp when cooldown expires
let puTimer     = null;
let lastPuGrant = -1;    // which interval has been granted

let animFrame   = null;
let groundY     = 0;

// Canvas
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const flagImgs = {}; // code → HTMLImageElement

function $id(id){ return document.getElementById(id); }
function getDevice(){
  // index.html ile aynı key'i kullan
  let d = localStorage.getItem('ta26_device');
  if (!d){ d = Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('ta26_device',d); }
  return d;
}

// ============================================================
// FLAG IMAGES
// ============================================================
function getFlagImg(code){
  if (flagImgs[code]) return flagImgs[code];
  const img = new Image();
  try {
    if (typeof drawCountryFlag === 'function'){
      img.src = drawCountryFlag(code);
    }
  } catch{}
  flagImgs[code] = img;
  return img;
}
function flagCanvas(code, size=36){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const cx = c.getContext('2d');
  try {
    if (typeof drawCountryFlag === 'function'){
      const img = new Image();
      img.src = drawCountryFlag(code);
      cx.drawImage(img, 0, 0, size, size);
    }
  } catch{}
  return c;
}

// ============================================================
// FLAG PICKER
// ============================================================
function buildFlagGrid(filter = ''){
  const grid = $id('flagGrid');
  grid.innerHTML = '';
  const q = filter.toLowerCase();
  const list = q ? COUNTRIES.filter(x => x.n.toLowerCase().includes(q) || x.c.toLowerCase().includes(q)) : COUNTRIES;
  list.forEach(({c, n}) => {
    const div = document.createElement('div');
    div.className = 'flag-opt' + (myFlag && myFlag.code === c ? ' selected' : '');
    div.dataset.code = c;
    const fc = flagCanvas(c, 36);
    div.appendChild(fc);
    const lbl = document.createElement('span');
    lbl.textContent = c;
    div.appendChild(lbl);
    div.onclick = () => selectFlag(c, n);
    grid.appendChild(div);
  });
}
function selectFlag(code, name){
  myFlag = { code, name };
  localStorage.setItem('crun_flag', JSON.stringify(myFlag));
  buildFlagGrid($id('flagSearch').value);
  sendFlag();
  renderLobby();
}
$id('flagSearch').addEventListener('input', e => buildFlagGrid(e.target.value));

async function sendFlag(){
  if (!myFlag) return;
  try {
    await fetch(`/api/crun/${roomId}/set-flag`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ device: deviceId, flag: myFlag }),
    });
  } catch{}
}

// ============================================================
// LOBBY RENDERING
// ============================================================
let myReady = false;

function renderLobby(){
  if (!serverState) return;
  const st = serverState;
  $id('lobbyRoomId').textContent = `ODA: ${roomId}`;

  const readyCount = st.players.filter(p => p.ready).length;
  $id('hdrMeta').textContent = `${st.duration}sn · ${st.players.length}/4 · ${readyCount} hazır`;

  const slotsEl = $id('playerSlots');
  slotsEl.innerHTML = '';
  const lanes = [0,1,2,3];
  lanes.forEach(i => {
    const p = st.players.find(p => p.lane === i);
    const div = document.createElement('div');
    const isMe = p && p.deviceId === deviceId;
    div.className = 'player-slot' + (p ? (isMe ? ' me' : '') : ' empty');

    const dot = document.createElement('div');
    dot.className = 'slot-lane';
    dot.style.background = LANE_COLORS[i] + '33';
    dot.style.color = LANE_COLORS[i];
    dot.textContent = i + 1;

    const flagWrap = document.createElement('div');
    flagWrap.className = 'slot-flag';
    if (p && p.flag){
      const fc = flagCanvas(p.flag.code, 32);
      flagWrap.appendChild(fc);
    }

    const nameEl = document.createElement('div');
    nameEl.style.flex = '1';
    const pname = document.createElement('div');
    pname.className = 'slot-name';
    pname.textContent = p ? p.name : 'Boş';
    nameEl.appendChild(pname);
    if (isMe){
      const youTag = document.createElement('div');
      youTag.className = 'slot-you';
      youTag.textContent = 'SEN';
      nameEl.appendChild(youTag);
    }

    div.appendChild(dot);
    div.appendChild(flagWrap);
    div.appendChild(nameEl);

    // Ready indicator
    if (p){
      const readyEl = document.createElement('div');
      readyEl.className = 'slot-ready';
      readyEl.textContent = p.ready ? '✅' : '⏳';
      div.appendChild(readyEl);
    }

    slotsEl.appendChild(div);
  });

  // HAZIR butonu — bayrak seçilmişse ve henüz hazır değilse aktif
  const hazirBtn = $id('hazirBtn');
  if (myReady){
    hazirBtn.textContent = '✅ Hazırsın!';
    hazirBtn.disabled = true;
    hazirBtn.style.opacity = '.6';
  } else {
    hazirBtn.textContent = myFlag ? '✓ HAZIR' : 'Önce bayrak seç';
    hazirBtn.disabled = !myFlag;
    hazirBtn.style.opacity = myFlag ? '1' : '.5';
  }

  const amCreator = st.creator === deviceId;
  const canForce  = amCreator && st.players.length >= 2;
  const fsBtn = $id('forceStartBtn');
  fsBtn.style.display = amCreator ? '' : 'none';
  fsBtn.disabled = !canForce;

  const allReady = st.players.length >= 2 && st.players.every(p => p.ready);
  $id('lobbyNote').textContent = allReady
    ? 'Herkes hazır! Başlıyor...'
    : `${readyCount}/${st.players.length} kişi hazır`;
}

$id('hazirBtn').onclick = async () => {
  if (!myFlag){ alert('Önce bir bayrak seç!'); return; }
  $id('hazirBtn').disabled = true;
  try {
    const res  = await fetch(`/api/crun/${roomId}/ready`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ device: deviceId }),
    });
    const data = await res.json();
    if (data.ok){ myReady = true; renderLobby(); }
  } catch{ $id('hazirBtn').disabled = false; }
};

$id('forceStartBtn').onclick = async () => {
  $id('forceStartBtn').disabled = true;
  try {
    await fetch(`/api/crun/${roomId}/force-start`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ device: deviceId }),
    });
  } catch{ $id('forceStartBtn').disabled = false; }
};

// ============================================================
// COUNTDOWN
// ============================================================
let _cdInterval = null;

function startCountdown(startAt){
  if (_cdInterval) return; // çift çağrı koruması

  $id('lobbyOverlay').classList.add('hidden');
  $id('countdownOverlay').classList.remove('hidden');
  const cdEl = $id('cdNum');

  function tick(){
    const rem = Math.ceil((startAt - Date.now()) / 1000);
    if (rem > 0){
      if (cdEl.textContent !== String(rem)){
        cdEl.textContent = rem;
        cdEl.className = '';
        void cdEl.offsetWidth;
        cdEl.className = 'countdown-num';
      }
    } else {
      clearInterval(_cdInterval);
      _cdInterval = null;
      cdEl.className = 'countdown-go';
      cdEl.textContent = 'GO!';
      setTimeout(() => $id('countdownOverlay').classList.add('hidden'), 700);
    }
  }

  tick(); // hemen ilk sayıyı göster
  _cdInterval = setInterval(tick, 200); // 200ms'de bir kontrol et
}

// ============================================================
// PHYSICS HELPERS
// ============================================================
function getPS(id){
  if (!playerState[id]) playerState[id] = { offset:0, boosts:[], freezes:[] };
  return playerState[id];
}

function getDistance(id, now){
  if (!gameStartAt || now < gameStartAt) return 0;
  const ps = getPS(id);
  const elapsedSec = (now - gameStartAt) / 1000;

  let frozenSec = 0;
  for (const f of ps.freezes){
    if (now >= f.start){
      frozenSec += (Math.min(now, f.start + f.duration) - f.start) / 1000;
    }
  }

  let boostBonus = 0;
  for (const b of ps.boosts){
    if (now >= b.start){
      const bSec = (Math.min(now, b.start + b.duration) - b.start) / 1000;
      boostBonus += BASE_SPEED * BOOST_AMOUNT * bSec;
    }
  }

  const runSec = Math.max(0, elapsedSec - frozenSec);
  return Math.max(0, ps.offset + runSec * BASE_SPEED + boostBonus);
}

function isPlayerFrozen(id, now){
  const ps = getPS(id);
  return ps.freezes.some(f => now >= f.start && now < f.start + f.duration);
}

function isPlayerBoosted(id, now){
  const ps = getPS(id);
  return ps.boosts.some(b => now >= b.start && now < b.start + b.duration);
}

function applyEvent(ev){
  if (processedEvents.has(ev.id)) return;
  processedEvents.add(ev.id);
  const players = serverState?.players || [];
  switch(ev.type){
    case 'hammer':
      if (ev.target) getPS(ev.target).offset -= HAMMER_HIT;
      if (ev.target === deviceId) showFlash('rgba(255,80,80,.45)');
      break;
    case 'boost':
      getPS(ev.from).boosts.push({ start: ev.ts, duration: BOOST_DUR });
      if (ev.from === deviceId) showFlash('rgba(255,215,0,.3)');
      break;
    case 'freeze':
      if (ev.target) getPS(ev.target).freezes.push({ start: ev.ts, duration: FREEZE_DUR });
      if (ev.target === deviceId) showFlash('rgba(116,192,252,.45)');
      break;
    case 'lightning':
      players.forEach(p => {
        if (p.deviceId !== ev.from) getPS(p.deviceId).offset -= LIGHTNING_HIT;
      });
      if (ev.from !== deviceId) showFlash('rgba(218,119,242,.35)');
      break;
  }
}

function showFlash(color){
  const el = $id('effectFlash');
  el.style.background = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 220);
}

// ============================================================
// POWER-UP SYSTEM
// ============================================================
function grantPowerup(){
  if (myPowerup) return; // still have one
  const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  myPowerup = { type, ...PU_META[type] };
  showPowerupUI();
}

function showPowerupUI(){
  if (!myPowerup){ hidePowerupContent(); return; }
  $id('puEmpty').style.display  = 'none';
  $id('puContent').style.display = '';
  $id('puIcon').textContent  = myPowerup.icon;
  $id('puName').textContent  = myPowerup.name;
  $id('puHint').textContent  = myPowerup.hint;
  $id('puUseBtn').disabled   = false;
  $id('puCoolFill').style.width = '100%';
}

function hidePowerupContent(){
  $id('puEmpty').style.display   = '';
  $id('puContent').style.display = 'none';
  $id('puUseBtn').disabled       = true;
}

async function usePowerup(){
  if (!myPowerup || $id('puUseBtn').disabled) return;
  if (Date.now() < puCooldown) return;

  const type     = myPowerup.type;
  const players  = serverState?.players || [];
  const now      = Date.now();

  // Find nearest opponent
  let target = null;
  if (type === 'hammer' || type === 'freeze'){
    let bestDiff = Infinity;
    const myDist = getDistance(deviceId, now);
    players.forEach(p => {
      if (p.deviceId === deviceId) return;
      const diff = Math.abs(getDistance(p.deviceId, now) - myDist);
      if (diff < bestDiff){ bestDiff = diff; target = p.deviceId; }
    });
  }

  myPowerup = null;
  hidePowerupContent();
  puCooldown = now + 8000;
  startCooldownBar();

  try {
    await fetch(`/api/crun/${roomId}/powerup`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ device: deviceId, type, target }),
    });
  } catch{}
}

function startCooldownBar(){
  const fill = $id('puCoolFill');
  const end  = puCooldown;
  function update(){
    const rem = (end - Date.now()) / 8000;
    if (rem <= 0){ fill.style.width = '0%'; return; }
    fill.style.width = (rem * 100).toFixed(1) + '%';
    requestAnimationFrame(update);
  }
  update();
}

$id('puUseBtn').onclick = usePowerup;
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && serverState?.status === 'active'){
    e.preventDefault();
    usePowerup();
  }
});

// ============================================================
// CANVAS RENDERING
// ============================================================
function resizeCanvas(){
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const GROUND_TILE = 80; // px per stripe

function drawGround(scrollY){
  const W = canvas.width, H = canvas.height;
  const numLanes = serverState?.players?.length || 4;
  const laneW = W / numLanes;

  // Draw scrolling football pitch
  const offset = scrollY % (GROUND_TILE * 2);
  ctx.save();

  // Alternating green stripes (vertical lanes of pitch have horizontal stripes)
  for (let y = -offset - GROUND_TILE * 2; y < H + GROUND_TILE * 2; y += GROUND_TILE){
    const stripe = Math.floor((y + offset) / GROUND_TILE) % 2;
    ctx.fillStyle = stripe === 0 ? '#2E7D33' : '#27702C';
    ctx.fillRect(0, y, W, GROUND_TILE);
  }

  // Horizontal yard lines
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  for (let y = -offset - GROUND_TILE * 2; y < H + GROUND_TILE * 2; y += GROUND_TILE){
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Lane dividers (dashed)
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 8]);
  for (let i = 1; i < numLanes; i++){
    ctx.beginPath();
    ctx.moveTo(i * laneW, 0);
    ctx.lineTo(i * laneW, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function roundRect(cx, x, y, w, h, r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}

function drawCharacter(cx, x, y, flagCode, laneColor, animPhase, frozen, boosted, scale=1){
  cx.save();
  cx.translate(x, y);
  cx.scale(scale, scale);

  if (frozen) cx.filter = 'hue-rotate(180deg) saturate(1.5)';

  const bob   = Math.sin(animPhase * 2) * (frozen ? 0 : 2.5);
  const lLeg  = Math.sin(animPhase * 2) * (frozen ? 0 : 22);
  const rLeg  = -Math.sin(animPhase * 2) * (frozen ? 0 : 22);
  const lArm  = -Math.sin(animPhase * 2) * (frozen ? 0 : 18);
  const rArm  = Math.sin(animPhase * 2) * (frozen ? 0 : 18);

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath();
  cx.ellipse(0, 40, 14, 3.5, 0, 0, Math.PI*2);
  cx.fill();

  // LEFT LEG
  cx.save();
  cx.translate(-7, 20+bob);
  cx.rotate(lLeg * Math.PI/180);
  cx.fillStyle = '#D8D8D8';
  roundRect(cx, -4,0,8,18,4); cx.fill();
  cx.restore();

  // RIGHT LEG
  cx.save();
  cx.translate(7, 20+bob);
  cx.rotate(rLeg * Math.PI/180);
  cx.fillStyle = '#D8D8D8';
  roundRect(cx, -4,0,8,18,4); cx.fill();
  cx.restore();

  // BODY / T-SHIRT (flag clipped to torso ellipse)
  cx.save();
  cx.beginPath();
  cx.ellipse(0, 5+bob, 15, 18, 0, 0, Math.PI*2);
  cx.clip();
  const flagImg = getFlagImg(flagCode);
  if (flagImg && flagImg.complete && flagImg.naturalWidth > 0){
    cx.drawImage(flagImg, -15, -13+bob, 30, 36);
  } else {
    cx.fillStyle = laneColor || '#cc0000';
    cx.fillRect(-15,-13,30,36);
  }
  cx.restore();

  // Body outline
  cx.strokeStyle = '#E8E8E8';
  cx.lineWidth = 2;
  cx.beginPath();
  cx.ellipse(0, 5+bob, 15, 18, 0, 0, Math.PI*2);
  cx.stroke();

  // LEFT ARM
  cx.save();
  cx.translate(-16, 1+bob);
  cx.rotate(lArm * Math.PI/180);
  cx.fillStyle = '#E0E0E0';
  roundRect(cx,-4,0,8,14,4); cx.fill();
  cx.restore();

  // RIGHT ARM
  cx.save();
  cx.translate(16, 1+bob);
  cx.rotate(rArm * Math.PI/180);
  cx.fillStyle = '#E0E0E0';
  roundRect(cx,-4,0,8,14,4); cx.fill();
  cx.restore();

  // HEAD
  cx.fillStyle = '#F0F0F0';
  cx.beginPath();
  cx.arc(0, -11+bob, 13, 0, Math.PI*2);
  cx.fill();
  cx.strokeStyle = '#DDD';
  cx.lineWidth = 1;
  cx.stroke();

  // EYES — big chameleon-style
  cx.fillStyle = '#FFF';
  cx.beginPath();
  cx.arc(-4.5, -12+bob, 4.5, 0, Math.PI*2);
  cx.arc(4.5,  -12+bob, 4.5, 0, Math.PI*2);
  cx.fill();
  cx.fillStyle = frozen ? '#74C0FC' : '#222';
  cx.beginPath();
  cx.arc(-3.5, -12+bob, 2.5, 0, Math.PI*2);
  cx.arc(5.5,  -12+bob, 2.5, 0, Math.PI*2);
  cx.fill();

  // SMILE
  cx.strokeStyle = '#666';
  cx.lineWidth = 1.5;
  cx.beginPath();
  cx.arc(0, -8+bob, 4, 0.2, Math.PI-0.2);
  cx.stroke();

  // BOOST effect — golden glow outline
  if (boosted){
    cx.strokeStyle = 'rgba(255,200,0,0.7)';
    cx.lineWidth = 3;
    cx.beginPath();
    cx.ellipse(0, -2, 22, 36, 0, 0, Math.PI*2);
    cx.stroke();
  }

  cx.filter = 'none';
  cx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
let animPhase = 0;
let lastFrame = 0;

function gameLoop(ts){
  animFrame = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastFrame) / 1000, 0.1);
  lastFrame = ts;
  const now = Date.now();

  if (!serverState) return;
  const { status, players } = serverState;

  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (status === 'active' || status === 'finished'){
    animPhase += dt * 3.5;

    // Camera follows MY distance
    const myDist = getDistance(deviceId, now);

    // Ground scroll (upward as we run)
    groundY = (groundY - myDist * 0.0 - BASE_SPEED * dt) % (GROUND_TILE * 2);
    const scrollSpeed = isPlayerFrozen(deviceId, now) ? 0 : BASE_SPEED * dt;
    groundY = ((groundY - scrollSpeed) % (GROUND_TILE * 2) + GROUND_TILE * 2) % (GROUND_TILE * 2);
    drawGround(groundY);

    // Draw characters
    const numPlayers = players.length || 4;
    const laneW = canvas.width / numPlayers;
    const baseY = canvas.height * 0.58;

    players.forEach((p, i) => {
      const pDist   = getDistance(p.deviceId, now);
      const relDist = pDist - myDist; // +: ahead, -: behind
      const charX   = (p.lane ?? i) * laneW + laneW / 2;
      const charY   = baseY - relDist * 0.45; // scale: 1 unit = 0.45px on screen
      const frozen  = isPlayerFrozen(p.deviceId, now);
      const boosted = isPlayerBoosted(p.deviceId, now);
      const isMe    = p.deviceId === deviceId;
      const flagCode = p.flag?.code;
      const laneCol  = LANE_COLORS[p.lane ?? i];

      // Clamp to screen
      const clampedY = Math.max(50, Math.min(canvas.height - 40, charY));

      // Draw "off-screen" arrow indicator if clamped
      if (charY < 60 && !isMe){
        ctx.fillStyle = laneCol;
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('▲ ahead', charX, 68);
      } else if (charY > canvas.height - 50 && !isMe){
        ctx.fillStyle = laneCol;
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('▼ behind', charX, canvas.height - 54);
      }

      drawCharacter(ctx, charX, clampedY, flagCode, laneCol, animPhase, frozen, boosted, isMe ? 1 : 0.88);

      // "YOU" label under own character
      if (isMe){
        ctx.fillStyle = 'rgba(255,200,61,0.85)';
        ctx.font = 'bold 10px "Chivo Mono",monospace';
        ctx.textAlign = 'center';
        ctx.fillText('YOU', charX, clampedY + 50);
      }

      // Update lane labels
      const li = p.lane ?? i;
      if ($id('lln'+li)) $id('lln'+li).textContent = p.name;
      if ($id('lld'+li)) $id('lld'+li).textContent = Math.round(pDist) + 'm';
      const effectEl = $id('lle'+li);
      if (effectEl) effectEl.textContent = frozen ? '❄️' : boosted ? '⚡' : '';
    });

    // Timer bar
    if (status === 'active' && gameEndAt){
      const remPct = Math.max(0, (gameEndAt - now) / (serverState.duration * 1000)) * 100;
      $id('timerFill').style.width = remPct.toFixed(1) + '%';
    }

    // Power-up drop check
    if (status === 'active' && gameStartAt){
      const elapsed = now - gameStartAt;
      const puNum   = Math.floor(elapsed / POWERUP_INTERVAL);
      if (puNum > lastPuGrant && !myPowerup){
        lastPuGrant = puNum;
        grantPowerup();
      }
    }
  } else {
    // Draw static pitch in lobby / countdown
    groundY = (groundY - 0.5 + GROUND_TILE * 2) % (GROUND_TILE * 2);
    drawGround(groundY);
  }
}

// ============================================================
// SSE & STATE HANDLING
// ============================================================
function applyState(state){
  if (!state || state.error) return;
  serverState = state;
  const { status, startAt, endAt } = state;

  if (status === 'waiting'){
    renderLobby();
  }

  // Countdown: sadece handleSSE / init üzerinden çağrılır (double-call önlemi)
  if (status === 'countdown'){
    $id('lobbyOverlay').classList.add('hidden');
  }

  if (status === 'active'){
    if (!gameStartAt && startAt){
      gameStartAt = startAt;
      gameEndAt   = endAt;
      initPlayerState(state.players);
      $id('lobbyOverlay').classList.add('hidden');
      $id('countdownOverlay').classList.add('hidden');
      if (_cdInterval){ clearInterval(_cdInterval); _cdInterval = null; }
      $id('timerBar').classList.remove('hidden');
      $id('laneLabels').classList.remove('hidden');
      $id('powerupBar').classList.remove('hidden');
      $id('hdrMeta').textContent = `${state.duration}sn — KOŞUYOR!`;
      lastPuGrant = -1;
    }
  }

  if (status === 'finished'){
    $id('timerBar').classList.add('hidden');
    $id('powerupBar').classList.add('hidden');
    $id('laneLabels').classList.add('hidden');
    if (_cdInterval){ clearInterval(_cdInterval); _cdInterval = null; }
    showFinished(state);
    if (gameStartAt){
      const myDist = getDistance(deviceId, Date.now());
      fetch(`/api/crun/${roomId}/distance`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ device: deviceId, distance: Math.round(myDist) }),
      }).catch(()=>{});
    }
  }
}

function initPlayerState(players){
  players.forEach(p => {
    if (!playerState[p.deviceId]){
      playerState[p.deviceId] = { offset: 0, boosts: [], freezes: [] };
    }
  });
}

function handleSSE(raw){
  let data;
  try { data = JSON.parse(raw); } catch{ return; }

  if (data._event === 'powerup' && data.event){
    applyEvent(data.event);
    return;
  }

  applyState(data);

  // Countdown'ı tek noktadan başlat
  if (data.status === 'countdown' && data.startAt){
    startCountdown(data.startAt); // _cdInterval koruması çift çağrıyı önler
  }
}

function connectSSE(){
  if (sse) sse.close();
  sse = new EventSource(`/api/crun/${roomId}/stream`);
  sse.onmessage = e => handleSSE(e.data);
  sse.onerror   = () => setTimeout(connectSSE, 3000);
}

function showFinished(state){
  if (!$id('finishedOverlay').classList.contains('hidden')) return;
  $id('finishedOverlay').classList.remove('hidden');

  // Determine rankings by distance
  const now = Date.now();
  const ranked = [...state.players].map(p => ({
    ...p,
    finalDist: p.distance ?? Math.round(getDistance(p.deviceId, gameEndAt || now)),
  })).sort((a,b) => b.finalDist - a.finalDist);

  const medals = ['🥇','🥈','🥉','4️⃣'];
  const pod = $id('podium');
  pod.innerHTML = '';
  ranked.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'podium-row' + (i === 0 ? ' first' : '');
    const fc = flagCanvas(p.flag?.code || '', 36);
    row.innerHTML = `
      <div class="podium-rank">${medals[i] || (i+1)}</div>
      <div class="podium-flag"></div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-dist">${p.finalDist}m</div>`;
    row.querySelector('.podium-flag').appendChild(fc);
    pod.appendChild(row);
  });

  const winner = ranked[0];
  $id('finishTitle').textContent = winner?.deviceId === deviceId ? '🏆 KAZANDIN!' : `🏁 ${winner?.name || '?'} Kazandı!`;
}

// ============================================================
// INIT
// ============================================================
async function init(){
  if (!roomId){ window.location.href = '/'; return; }

  // Build flag picker
  buildFlagGrid();

  // Join room
  try {
    const res = await fetch(`/api/crun/${roomId}/join`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ device: deviceId, flag: myFlag }),
    });
    const data = await res.json();
    if (!data.ok && data.reason !== 'already_started' && data.reason !== 'already_joined'){
      if (data.reason === 'not_logged_in'){
        localStorage.setItem('crun_pending', roomId);
        window.location.href = '/';
        return;
      }
    }
  } catch{}

  // Load current state
  try {
    const res   = await fetch(`/api/crun/${roomId}/state`);
    const state = await res.json();
    applyState(state);
    // Eğer geri sayım başlamışsa hemen göster (_cdInterval koruması çift çağrıyı önler)
    if (state.status === 'countdown' && state.startAt){
      startCountdown(state.startAt);
    }
  } catch{}

  // Start SSE
  connectSSE();

  // Start render loop
  lastFrame = performance.now();
  gameLoop(lastFrame);
}

init();
